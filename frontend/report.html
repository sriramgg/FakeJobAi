<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Report Scam - FakeJobAI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap"
        rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2e0b5a50f.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary-color: #4361ee;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: 1px solid rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding-top: 80px;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Background Blobs --- */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: floatShape 20s infinite alternate;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: #ff4d6d;
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #4361ee;
            bottom: 50px;
            right: -100px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: #7209b7;
            top: 40%;
            left: 30%;
            animation-delay: -10s;
            opacity: 0.3;
        }

        @keyframes floatShape {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(50px, 40px) rotate(20deg);
            }
        }

        /* --- Glass Card --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        /* --- Navbar --- */
        .navbar {
            background: linear-gradient(to right, #ffffff, #e3f2fd);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-bottom: none;
            padding: 12px 0;
        }

        .navbar-brand {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.7rem;
            color: #333;
        }

        .navbar-brand span {
            color: var(--primary-color);
        }

        .nav-link {
            font-weight: 500;
            color: #555 !important;
            margin-left: 15px;
            transition: color 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--primary-color) !important;
        }

        .login-text span:first-child {
            color: #4895ef;
            font-weight: 600;
        }

        .login-text span:last-child {
            color: #333;
            font-weight: 700;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #ddd;
        }

        .form-control:focus {
            border-color: #ff4d6d;
            box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.1);
        }

        .btn-danger-soft {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            transition: 0.3s;
        }

        .btn-danger-soft:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.3);
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }
    </style>
</head>

<body>

    <!-- Backgrounds (Red theme for Alert) -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="logo.svg" alt="Logo" width="36" height="36" class="me-2">
                FakeJob<span>AI</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
                    <li class="nav-item"><a class="nav-link active" href="report.html">Report</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item ms-2">
                        <a class="nav-link login-text" href="login.html"><span>Log</span><span>in</span></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="container d-flex align-items-center flex-grow-1 py-5">
        <div class="glass-card" data-aos="fade-up">
            <div class="text-center mb-4">
                <div class="display-4 text-danger mb-3"><i class="fas fa-exclamation-triangle"></i></div>
                <h2 class="fw-bold">Report a Scam</h2>
                <p class="text-muted">Help protect the community by reporting fraudulent job posts.</p>
            </div>

            <form id="reportForm">
                <div class="mb-3">
                    <label class="form-label fw-bold">Scam URL (Optional)</label>
                    <input type="url" class="form-control" id="scamUrl"
                        placeholder="https://linkedin.com/jobs/view/...">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Description / Details</label>
                    <textarea class="form-control" id="scamDetails" rows="4"
                        placeholder="Describe why this is a scam (e.g., asked for money, telegram interview)..."
                        required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Your Name (Optional)</label>
                    <input type="text" class="form-control" id="reporterName" placeholder="Anonymous">
                </div>

                <button type="submit" class="btn btn-danger-soft w-100 shadow-sm">Submit Report</button>
            </form>

            <div id="successMsg" class="alert alert-success mt-3 text-center" style="display:none;">
                <i class="fas fa-check-circle me-1"></i> Report submitted successfully! Thank you.
            </div>
        </div>
    </div>

    <footer><small class="text-muted">© 2025 FakeJobAI. Community Driven Protection.</small></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init();

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';
            btn.disabled = true;

            const fd = new FormData();
            fd.append('url', document.getElementById('scamUrl').value);
            fd.append('details', document.getElementById('scamDetails').value);
            fd.append('reporter', document.getElementById('reporterName').value || 'Anonymous');

            try {
                const res = await fetch('http://127.0.0.1:8000/analyze/report-scam', { method: 'POST', body: fd });
                if (res.ok) {
                    document.getElementById('reportForm').reset();
                    document.getElementById('successMsg').style.display = 'block';
                    setTimeout(() => document.getElementById('successMsg').style.display = 'none', 5000);
                } else {
                    alert('Failed to submit report.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>

    <!-- Authentication Handler -->
    <script src="js/auth.js"></script>
</body>

</html>
