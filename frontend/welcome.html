<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setting Up Your Account... - FakeJobAI</title>

    <!-- External Resources -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2e0b5a50f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8;
            /* Fallback */
            overflow: hidden;
        }

        /* --- Animated Background --- */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: floatShape 20s infinite alternate;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: #4cc9f0;
            top: -150px;
            left: -150px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #4361ee;
            bottom: 50px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes floatShape {
            from {
                transform: translate(0, 0) rotate(0deg);
            }

            to {
                transform: translate(50px, 40px) rotate(20deg);
            }
        }

        /* --- Premium Welcome Modal Styling --- */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .status-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
            transform: scale(0.9);
            opacity: 0;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .status-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #4361ee, #4cc9f0, #4361ee);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .status-header h2 {
            font-weight: 800;
            color: #1e293b;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .status-header p {
            color: #64748b;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .icon-large {
            font-size: 56px;
            color: #4361ee;
            margin-bottom: 25px;
            filter: drop-shadow(0 10px 15px rgba(67, 97, 238, 0.3));
        }

        .step-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            padding: 12px 20px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.5s;
            opacity: 0.6;
        }

        .step-item.active {
            opacity: 1;
            background: #fff;
            border-color: #4361ee;
            box-shadow: 0 4px 12px rgba(67, 97, 238, 0.1);
            transform: scale(1.02);
        }

        .step-icon {
            width: 32px;
            height: 32px;
            font-size: 14px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            transition: all 0.3s;
        }

        .step-item.done .step-icon {
            background: #10b981;
            color: #fff;
        }

        .step-item.done .step-text {
            color: #0f172a;
            font-weight: 600;
        }

        /* Timer Ring */
        .timer-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .timer-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .timer-ring-circle {
            stroke-dasharray: 251;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
            stroke: #4361ee;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 800;
            color: #4361ee;
        }
    </style>
</head>

<body>

    <!-- Backgrounds -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Main Status Card -->
    <div class="status-box">

        <div class="status-header">
            <i class="fas fa-shield-alt icon-large animate__animated animate__bounceIn"></i>
            <h2>Welcome to FakeJobAI</h2>
            <p>Establishing your secure session...</p>
        </div>

        <div class="d-flex flex-column align-items-start w-100 ps-4">

            <div class="step-item" id="step1">
                <div class="step-icon"><i class="fas fa-user-check"></i></div>
                <div class="step-text">Verifying Credentials</div>
            </div>

            <div class="step-item" id="step2">
                <div class="step-icon"><i class="fas fa-cloud-download-alt"></i></div>
                <div class="step-text">Syncing User Profile</div>
            </div>

            <div class="step-item" id="step3">
                <div class="step-icon"><i class="fas fa-paper-plane"></i></div>
                <div class="step-text">Sending Welcome Email</div>
            </div>

            <div class="step-item" id="step4">
                <div class="step-icon"><i class="fas fa-check-circle"></i></div>
                <div class="step-text fw-bold">Setup Complete!</div>
            </div>

        </div>

        <!-- Success & Timer Area -->
        <div id="redirectBox" style="display:none; margin-top: 35px; border-top: 1px solid #e2e8f0; padding-top: 25px;">
            <h5 class="text-success fw-bold animate__animated animate__fadeIn mb-4">🚀 Login Successful!</h5>

            <div class="timer-wrapper">
                <svg class="timer-ring" width="100" height="100">
                    <circle class="timer-ring-bg" stroke="#e2e8f0" stroke-width="4" fill="transparent" r="40" cx="50"
                        cy="50" />
                    <circle class="timer-ring-circle" id="timerCircle" stroke-width="4" stroke-linecap="round"
                        fill="transparent" r="40" cx="50" cy="50" />
                </svg>
                <div class="timer-text" id="timer">5</div>
            </div>

            <p class="small text-muted mb-3">Redirecting to Dashboard automatically...</p>
            <button class="btn btn-outline-primary btn-sm rounded-pill px-5 py-2 fw-bold" onclick="forceRedirect()">
                Go Now <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </div>

    </div>

    <script type="module">
        // Logic to run visual flow on page load

        // Check if we have user data (passed from login via localStorage)
        const initPage = () => {
            const userStr = localStorage.getItem("fakejobai_user");
            if (!userStr) {
                // Safety fallback if accessed directly
                window.location.href = "login.html";
                return;
            }

            const user = JSON.parse(userStr);
            console.log("Welcome Page: User loaded", user.email);

            startVisualFlow(user);
        };

        const setStep = (num, status) => {
            const el = document.getElementById(`step${num}`);
            el.className = `step-item active ${status}`;
            if (status === 'done') el.innerHTML = el.innerHTML.replace('Wait...', 'Done').replace('Processing', 'Complete');
        };

        function startVisualFlow(user) {
            // Step 1: Verify
            setTimeout(() => setStep(1, 'done'), 500);

            // Step 2: Data
            setTimeout(() => setStep(2, 'done'), 1200);

            // Step 3: Email (Mock visual, actual send happens in background usually or we trigger here)
            setTimeout(() => {
                setStep(3, 'done');
                // Actually trigger email in background for safety? Or rely on login.html having done it?
                // Let's rely on login.html or re-trigger if needed. 
                // For visual smoothness, we just assume it's sent.
            }, 2000);

            // Step 4: Complete
            setTimeout(() => {
                setStep(4, 'done');
                document.getElementById('redirectBox').style.display = 'block';
                startCountdown();
            }, 2800);
        }

        function startCountdown() {
            let count = 5;
            const totalTime = 5;
            const timerEl = document.getElementById('timer');
            const circle = document.getElementById('timerCircle');
            const circumference = 2 * Math.PI * 40;

            // Initialize circle
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = 0;

            const interval = setInterval(() => {
                count--;
                timerEl.innerText = count;

                // Update Ring Progress
                const offset = circumference - (count / totalTime) * circumference;
                circle.style.strokeDashoffset = offset;

                if (count <= 0) {
                    clearInterval(interval);
                    forceRedirect();
                }
            }, 1000);
        }

        window.forceRedirect = function () {
            window.location.href = "index.html";
        };

        // Run
        initPage();
    </script>
</body>

</html>
